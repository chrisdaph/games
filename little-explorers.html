<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Explorers – Bible Games</title>
<link rel="stylesheet" href="styles.css">
</head>
<body data-group="toddler">

<header>
  <h1>🐑 Little Explorers</h1>
  <p>Ages 2–5 · Big, easy pieces</p>
</header>

<main>

  <!-- SCREEN 1: Puzzle picker -->
  <section id="screen-picker" class="screen active">
    <div class="backbar">
      <a class="btn" href="bible-games.html">← Bible Games</a>
    </div>
    <div class="puzzle-grid" id="puzzle-grid"></div>
  </section>

  <!-- SCREEN 2: Puzzle play -->
  <section id="screen-play" class="screen">
    <div class="backbar">
      <button class="btn" id="back-to-picker">← Choose Another Puzzle</button>
    </div>
    <div class="puzzle-header">
      <div>
        <h2 id="play-title"></h2>
        <p class="verse" id="play-verse"></p>
      </div>
      <div class="progress-pill" id="play-progress">0 / 0</div>
    </div>
    <div class="puzzle-stage">
      <div class="stage-row">
        <div class="side-tray" id="tray-left"></div>
        <div class="grid-zone" id="grid-zone"></div>
        <div class="side-tray" id="tray-right"></div>
      </div>
      <div class="tray-zone" id="tray-bottom"></div>
    </div>
  </section>

</main>

<footer>Made with love for family devotion time 💛</footer>

<div class="overlay" id="overlay">
  <div class="overlay-card">
    <div class="big-emoji">🎉</div>
    <h2>Wonderful job!</h2>
    <p id="overlay-verse"></p>
    <div class="overlay-actions">
      <button class="btn" id="play-again">Play Again</button>
      <button class="btn primary" id="pick-another">Choose Another Puzzle</button>
    </div>
  </div>
</div>

<script src="puzzles.js"></script>
</body>
</html>
